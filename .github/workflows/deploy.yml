name: Deploy to Pi

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install PHP dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader --no-dev

      - name: Copy .env file
        run: |
          if [ -f .env.production ]; then
            cp .env.production .env
          elif [ ! -f .env ]; then
            cp .env.example .env
          fi

      - name: Install Node dependencies
        run: npm ci

      - name: Build frontend assets
        run: npm run build

      - name: Ensure database exists
        run: touch database/database.sqlite

      - name: Run database migrations
        run: php artisan migrate --force --no-interaction

      - name: Clear and cache config
        run: |
          php artisan config:clear
          php artisan cache:clear
          php artisan route:cache
          php artisan view:cache

      - name: Sync files to production directory
        run: |
          sudo rsync -av --exclude='.git' --exclude='.github' --exclude='node_modules' --exclude='.env' ./ /var/www/html/balarama/
          sudo chown -R www-data:www-data /var/www/html/balarama
          sudo chmod -R 775 /var/www/html/balarama/storage /var/www/html/balarama/bootstrap/cache /var/www/html/balarama/database

      - name: Restart services
        run: |
          sudo systemctl restart apache2 || sudo systemctl restart nginx || sudo systemctl restart php8.4-fpm || true
