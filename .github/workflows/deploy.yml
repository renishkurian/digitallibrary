name: Deploy to Pi

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install PHP dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader --no-dev

      - name: Copy .env file
        run: |
          if [ -f .env.production ]; then
            cp .env.production .env
          elif [ ! -f .env ]; then
            cp .env.example .env
          fi

      - name: Install Node dependencies
        run: npm ci

      - name: Build frontend assets
        run: npm run build

      - name: Ensure database exists
        run: touch database/database.sqlite

      - name: Run database migrations
        run: php artisan migrate --force --no-interaction

      - name: Clear and cache config
        run: |
          php artisan config:clear
          php artisan cache:clear
          php artisan route:cache
          php artisan view:cache

      - name: Sync files to production directory
        run: |
          sudo rsync -av --exclude='.git' --exclude='.github' --exclude='node_modules' --exclude='.env' --exclude='database/database.sqlite' --exclude='database/database.sqlite-journal' --exclude='public/thumbs' ./ /var/www/html/balarama/
          
          # Exhaustive permission fix for production
          sudo chown -R www-data:www-data /var/www/html/balarama
          
          # Ensure all storage directories exist and are fully writable
          sudo mkdir -p /var/www/html/balarama/storage/framework/sessions
          sudo mkdir -p /var/www/html/balarama/storage/framework/views
          sudo mkdir -p /var/www/html/balarama/storage/framework/cache
          sudo mkdir -p /var/www/html/balarama/storage/logs
          
          # More aggressive permissions for Storage and Cache
          sudo chmod -R 777 /var/www/html/balarama/storage
          sudo chmod -R 777 /var/www/html/balarama/bootstrap/cache
          sudo chown -R www-data:www-data /var/www/html/balarama/storage /var/www/html/balarama/bootstrap/cache
          
          # SQLite needs write permission on the directory to create journal files
          sudo chmod 777 /var/www/html/balarama/database
          
          # Ensure database exists but DO NOT overwrite if it already does
          if [ ! -f /var/www/html/balarama/database/database.sqlite ]; then
            sudo touch /var/www/html/balarama/database/database.sqlite
          fi
          
          sudo chmod 666 /var/www/html/balarama/database/database.sqlite
          sudo chown www-data:www-data /var/www/html/balarama/database/database.sqlite
          sudo chown www-data:www-data /var/www/html/balarama/database
          
          # Ensure logs are writable
          sudo touch /var/www/html/balarama/storage/logs/laravel.log
          sudo chmod 666 /var/www/html/balarama/storage/logs/laravel.log
          sudo chown www-data:www-data /var/www/html/balarama/storage/logs/laravel.log
          
          # Recreate thumbs symlink if missing (points to shared comics thumbs directory)
          if [ ! -L /var/www/html/balarama/public/thumbs ] && [ ! -d /var/www/html/balarama/public/thumbs ]; then
            sudo ln -s /var/www/html/comics/thumbs /var/www/html/balarama/public/thumbs
          elif [ -d /var/www/html/balarama/public/thumbs ] && [ ! -L /var/www/html/balarama/public/thumbs ]; then
            # If rsync created a regular directory, replace it with the symlink
            sudo rm -rf /var/www/html/balarama/public/thumbs
            sudo ln -s /var/www/html/comics/thumbs /var/www/html/balarama/public/thumbs
          fi

      - name: Post-sync Laravel optimization
        run: |
          cd /var/www/html/balarama
          sudo -u www-data php artisan cache:clear
          sudo -u www-data php artisan view:clear
          sudo -u www-data php artisan config:cache
          sudo -u www-data php artisan route:cache

      - name: Restart services
        run: |
          sudo systemctl restart nginx || true
          sudo systemctl restart php8.4-fpm || true
