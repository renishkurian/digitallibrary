name: Deploy to Pi

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install PHP dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader --no-dev

      - name: Install Node dependencies
        run: npm ci

      - name: Build frontend assets
        run: npm run build

      - name: Copy .env file
        run: cp .env.production .env || true

      - name: Generate app key (if needed)
        run: php artisan key:generate --force --no-interaction || true

      - name: Run database migrations
        run: php artisan migrate --force --no-interaction

      - name: Clear and cache config
        run: |
          php artisan config:clear
          php artisan cache:clear
          php artisan route:cache
          php artisan view:cache

      - name: Set permissions
        run: |
          chmod -R 775 storage bootstrap/cache
          chown -R www-data:www-data storage bootstrap/cache || true

      - name: Restart services
        run: |
          sudo systemctl restart apache2 || sudo systemctl restart nginx || true
